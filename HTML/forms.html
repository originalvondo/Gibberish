<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <style>
        body{
            margin: 0;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        form {
            justify-content: center;
        }
    </style>
</head>
<body>
    <form action=".">
        <label for="name">Enter your legal name:</label><br>
        <input type="text" name="name" id="name" placeholder="Your name here"><br> 
        <label for="socialsecurity">Enter your social security number please (it's safe here dw abt it)</label><br>
        <input type="text" name="socialsecurity" id="socialsecurity" placeholder="Your social security number here"><br>
        <label for="address">Enter your address please (for research purposes u can trust me)</label><br>
        <input type="text" name="socialsecurity" id="address" value="Folk Valley 📍"><br><br>

        <p>what r u?</p>
        <input type="radio" name="gender" id="male">
        <label for="male">male</label> <br>

        <input type="radio" name="gender" id="female">
        <label for="female">female</label> <br>
        
        <input type="radio" name="gender" id="gmail">
        <label for="gmail">email</label> <br>

        <input type="radio" name="gender" id="transformer">
        <label for="transformer">transformer</label> <br>
        
        <input type="radio" name="gender" id="him">
        <label for="him">im him</label>

        <br><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
